name: CI

on:
  push:
  pull_request:

jobs:
  pc-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint:proto
      - run: npm --workspace apps/pc-node run smoke
